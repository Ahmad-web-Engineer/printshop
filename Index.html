<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintShop Pro — Login</title>
<style>
:root{--blue:#2563eb;--blue-d:#1d4ed8;--green:#16a34a;--red:#dc2626;--gray:#6b7280;--border:#e5e7eb;--light:#f9fafb}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 50%,#ede9fe 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.wrap{width:100%;max-width:440px}
.logo-area{text-align:center;margin-bottom:24px}
.logo-area .icon{width:64px;height:64px;background:var(--blue);border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:12px;box-shadow:0 8px 24px rgba(37,99,235,.3)}
.logo-area h1{font-size:26px;font-weight:800;color:#1e3a8a}
.logo-area p{color:var(--gray);font-size:14px;margin-top:4px}
.card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.12);overflow:hidden}
.tabs{display:flex;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:14px;text-align:center;cursor:pointer;font-weight:600;font-size:14px;color:var(--gray);transition:all .2s;border-bottom:3px solid transparent;user-select:none}
.tab.on{color:var(--blue);border-bottom-color:var(--blue);background:#f0f7ff}
.body{padding:28px}
.view{display:none}
.view.on{display:block}
.alert{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
.alert.err{background:#fef2f2;color:var(--red);border:1px solid #fecaca}
.alert.ok{background:#f0fdf4;color:var(--green);border:1px solid #bbf7d0}
.fg{margin-bottom:16px}
label{display:block;font-size:12.5px;font-weight:600;color:#374151;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s;background:#fafafa}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:.3px}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover:not(:disabled){background:var(--blue-d);transform:translateY(-1px);box-shadow:0 6px 20px rgba(37,99,235,.35)}
.btn-blue:disabled{opacity:.6;cursor:not-allowed}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--gray);margin-top:10px;font-size:14px}
.btn-ghost:hover{background:var(--light)}
.divider{text-align:center;color:var(--gray);font-size:13px;margin:16px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border)}
.divider::before{left:0}.divider::after{right:0}
.admin-link{text-align:center;margin-top:14px;font-size:13px;color:var(--gray)}
.admin-link a{color:var(--blue);cursor:pointer;font-weight:600;text-decoration:none}
.admin-link a:hover{text-decoration:underline}
.admin-badge{display:inline-flex;align-items:center;gap:6px;background:#fef3c7;color:#92400e;border:1px solid #fcd34d;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600;margin-bottom:16px}
.spinner{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.pw-wrap{position:relative}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--gray);font-size:18px;user-select:none}
</style>
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="icon">🖨️</div>
    <h1>PrintShop Pro</h1>
    <p>Professional Printing, Right at Your Fingertips</p>
  </div>

  <div class="card">
    <div class="tabs">
      <div class="tab on" id="t-login"  onclick="showTab('login')">Login</div>
      <div class="tab"    id="t-reg"    onclick="showTab('reg')">Register</div>
      <!-- FIXED: Admin tab button now visible so active state is clear -->
      <div class="tab"    id="t-admin"  onclick="showTab('admin')" style="font-size:12px;color:var(--gray)">🔐 Admin</div>
    </div>
    <div class="body">

      <!-- ── LOGIN ── -->
      <div class="view on" id="v-login">
        <div class="alert" id="a-login"></div>
        <div class="fg">
          <label>Email Address</label>
          <input type="email" id="l-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="fg">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="l-pass" placeholder="Your password" autocomplete="current-password">
            <span class="pw-toggle" onclick="togglePw('l-pass',this)">👁</span>
          </div>
        </div>
        <button class="btn btn-blue" id="btn-login" onclick="doLogin()">Login to Your Account</button>
      </div>

      <!-- ── REGISTER ── -->
      <div class="view" id="v-reg">
        <div class="alert" id="a-reg"></div>
        <div class="fg">
          <label>Full Name</label>
          <input type="text" id="r-name" placeholder="John Doe" autocomplete="name">
        </div>
        <div class="fg">
          <label>Email Address</label>
          <input type="email" id="r-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="fg">
          <label>Phone Number</label>
          <input type="tel" id="r-phone" placeholder="10-digit mobile number" maxlength="10">
        </div>
        <div class="fg">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="r-pass" placeholder="Minimum 6 characters">
            <span class="pw-toggle" onclick="togglePw('r-pass',this)">👁</span>
          </div>
        </div>
        <button class="btn btn-blue" id="btn-reg" onclick="doRegister()">Create Account</button>
      </div>

      <!-- ── ADMIN LOGIN ── -->
      <div class="view" id="v-admin">
        <div class="admin-badge">🔐 Restricted — Admin Only</div>
        <div class="alert" id="a-admin"></div>
        <div class="fg">
          <label>Admin Email</label>
          <input type="email" id="a-email" placeholder="admin@printshop.com">
        </div>
        <div class="fg">
          <label>Admin Password</label>
          <div class="pw-wrap">
            <input type="password" id="a-pass" placeholder="Admin password">
            <span class="pw-toggle" onclick="togglePw('a-pass',this)">👁</span>
          </div>
        </div>
        <button class="btn btn-blue" id="btn-admin" onclick="doAdminLogin()">Access Admin Panel</button>
        <button class="btn btn-ghost" onclick="showTab('login')">← Back to User Login</button>
      </div>

    </div>
  </div>
</div>

<script>
// ── Session Check ──────────────────────────────────────────
(function(){
  try {
    const s = JSON.parse(localStorage.getItem('ps_session') || 'null');
    if (s && s.role === 'admin') { window.location.href = '/admin'; return; }
    if (s && s.userId)           { window.location.href = '/user';  return; }
  } catch(e) { localStorage.removeItem('ps_session'); }
})();

// ── Tabs ───────────────────────────────────────────────────
function showTab(t) {
  ['login','reg','admin'].forEach(id => {
    document.getElementById('v-' + id).classList.toggle('on', id === t);
    const tab = document.getElementById('t-' + id);
    if (tab) tab.classList.toggle('on', id === t);
  });
}

// ── Helpers ────────────────────────────────────────────────
function showAlert(id, msg, type='err') {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 6000);
}

function setBtn(id, loading, text) {
  const b = document.getElementById(id);
  b.disabled = loading;
  b.innerHTML = loading ? '<span class="spinner"></span> Please wait…' : text;
}

function togglePw(inputId, icon) {
  const inp = document.getElementById(inputId);
  const isText = inp.type === 'text';
  inp.type = isText ? 'password' : 'text';
  icon.textContent = isText ? '👁' : '🙈';
}

// ── Login ──────────────────────────────────────────────────
function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  if (!email || !pass) { showAlert('a-login', '⚠️ Please enter email and password'); return; }
  setBtn('btn-login', true, '');
  google.script.run
    .withSuccessHandler(r => {
      setBtn('btn-login', false, 'Login to Your Account');
      if (r.ok) {
        localStorage.setItem('ps_session', JSON.stringify({
          userId: r.user.id, name: r.user.name,
          email: r.user.email, token: r.token, role: 'user'
        }));
        window.location.href = '/user';
      } else { showAlert('a-login', '❌ ' + r.err); }
    })
    .withFailureHandler(e => { setBtn('btn-login', false, 'Login to Your Account'); showAlert('a-login', '❌ ' + e.message); })
    .loginUser(email, pass);
}

// ── Register ───────────────────────────────────────────────
function doRegister() {
  const name  = document.getElementById('r-name').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const phone = document.getElementById('r-phone').value.trim();
  const pass  = document.getElementById('r-pass').value;
  if (!name || !email || !phone || !pass) { showAlert('a-reg', '⚠️ All fields are required'); return; }
  if (pass.length < 6)                   { showAlert('a-reg', '⚠️ Password must be at least 6 characters'); return; }
  if (!/^\d{10}$/.test(phone))           { showAlert('a-reg', '⚠️ Enter a valid 10-digit phone number'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('a-reg', '⚠️ Enter a valid email address'); return; }
  setBtn('btn-reg', true, '');
  google.script.run
    .withSuccessHandler(r => {
      setBtn('btn-reg', false, 'Create Account');
      if (r.ok) { showAlert('a-reg', '✅ ' + r.msg, 'ok'); setTimeout(() => showTab('login'), 2000); }
      else      { showAlert('a-reg', '❌ ' + r.err); }
    })
    .withFailureHandler(e => { setBtn('btn-reg', false, 'Create Account'); showAlert('a-reg', '❌ ' + e.message); })
    .registerUser(name, email, pass, phone);
}

// ── Admin Login ────────────────────────────────────────────
function doAdminLogin() {
  const email = document.getElementById('a-email').value.trim();
  const pass  = document.getElementById('a-pass').value;
  if (!email || !pass) { showAlert('a-admin', '⚠️ Enter admin credentials'); return; }
  setBtn('btn-admin', true, '');
  google.script.run
    .withSuccessHandler(r => {
      setBtn('btn-admin', false, 'Access Admin Panel');
      if (r.ok) {
        localStorage.setItem('ps_session', JSON.stringify({ role: 'admin', token: r.token, name: 'Administrator' }));
        window.location.href = '/admin';
      } else { showAlert('a-admin', '❌ ' + r.err); }
    })
    .withFailureHandler(e => { setBtn('btn-admin', false, 'Access Admin Panel'); showAlert('a-admin', '❌ ' + e.message); })
    .adminLogin(email, pass);
}

// ── Enter Key ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const active = document.querySelector('.view.on')?.id;
  if (active === 'v-login') doLogin();
  else if (active === 'v-reg') doRegister();
  else if (active === 'v-admin') doAdminLogin();
});
</script>
</body>
</html>
